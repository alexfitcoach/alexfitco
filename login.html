<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Alex Fitness</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 50px; }
        .box { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #218838; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Login to Your Account</h2>
        <input id="email" type="email" placeholder="Your Email"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button id="loginBtn">Login</button>
        <p id="message"></p>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        <p><a href="index.html">← Back to Home</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.onload = function() {
            const supabaseUrl = 'https://yvxttvoaxyhyncipxkep.supabase.co';
            const supabaseAnonKey = 'sb_publishable_ojFR7TDAAPuB8lWC7nKw5A_E4FAbo1O';
            const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

            document.getElementById('loginBtn').addEventListener('click', async function() {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const msg = document.getElementById('message');

                if (!email || !password) {
                    msg.innerText = 'Please fill in all fields.';
                    return;
                }

                msg.innerText = 'Logging in...';
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });

                if (error) {
                    console.error('Error:', error);
                    msg.innerText = 'Error: ' + error.message;
                } else {
                    console.log('User:', data.user);
                    msg.innerText = 'Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1500);
                }
            });
        };
    </script>
</body>
</html>
