<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Alex Fitness</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 50px; }
        .box { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        a { color: #28a745; text-decoration: none; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Create Your Account</h2>
        <input id="email" type="email" placeholder="Your Email"><br>
        <input id="password" type="password" placeholder="Password (min 6 chars)"><br>
        <button onclick="signup()">Sign Up</button>
        <p>Already have an account? <a href="login.html">Login</a></p>
        <p><a href="index.html">← Back to Home</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        console.log('Script loaded successfully!');

        const supabase = window.supabase.createClient(
            'https://yvxttvoaxyhyncipxke.p.supabase.co',
            'sb_publishable_ojFR7TDAAPuB8lWC7nKw5A_E4FAbo1O'
        );

        function signup() {
            console.log('Signup function called!');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!email || !password) {
                alert('Please fill in all fields.');
                return;
            }
            supabase.auth.signUp({ email, password })
                .then(({ data, error }) => {
                    if (error) {
                        alert('Error: ' + error.message);
                    } else {
                        alert('Sign up successful! You can now log in.');
                        window.location.href = "login.html";
                    }
                });
        }
    </script>
</body>
</html>
