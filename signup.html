<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Alex Fitness</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; padding: 50px; }
        .box { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px #ccc; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #007bff; color: white; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        a { color: #28a745; text-decoration: none; }
        #message { margin-top: 15px; font-weight: bold; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Create Your Account</h2>
        <input id="email" type="email" placeholder="Your Email"><br>
        <input id="password" type="password" placeholder="Password (min 6 chars)"><br>
        <button id="signupBtn">Sign Up</button>
        <p id="message"></p>
        <p>Already have an account? <a href="login.html">Login</a></p>
        <p><a href="index.html">← Back to Home</a></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        window.onload = function() {
            const supabase = window.supabase.createClient(
                'https://yvxttvoaxyhyncipxkep.supabase.co',
                'sb_publishable_ojFR7TDAAPuB8lWC7nKw5A_E4FAbo1O'
            );
            document.getElementById('signupBtn').addEventListener('click', async function() {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const msg = document.getElementById('message');
                if (!email || !password) {
                    msg.innerText = 'Please fill in all fields.';
                    msg.className = 'error';
                    return;
                }
                msg.innerText = 'Creating account...';
                msg.className = '';
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        emailRedirectTo: 'https://alexfitcoach.github.io/alexfitco/dashboard.html'
                    }
                });
                if (error) {
                    console.error('Signup error:', error);
                    msg.innerText = 'Error: ' + error.message;
                    msg.className = 'error';
                } else {
                    msg.innerHTML = '✅ Account created! Check your email and <strong>click the verification link</strong> to access your dashboard.';
                    msg.className = 'success';
                    document.getElementById('signupBtn').disabled = true;
                }
            });
        };
    </script>
</body>
</html>
